name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  check-dist:
    # The committed dist/ must match a fresh build — a stale bundle is the most
    # common way a JS action ships broken.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Fail if dist/ is out of date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "dist/ is out of date — run 'npm run build' and commit the result:"
            git --no-pager diff --stat dist
            exit 1
          fi
